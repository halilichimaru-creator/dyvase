  <style>
    :root {
      --color-mint: #A7D7C5;
      --color-mint-light: #C5E8DB;
      --color-lavender: #C4B5E0;
      --color-lavender-light: #D9D0EC;
      --color-peach: #F5C7B8;
      --color-peach-light: #FBDED5;
      --color-coral: #F8B4A4;
      --color-sky: #9ED5E8;
      --color-cream: #FDF8F3;
      --color-cream-dark: #F5EDE5;
      --color-text-primary: #2D3047;
      --color-text-secondary: #5C5F7A;
      --color-text-muted: #8E90A6;
      --color-surface: #FFFFFF;
      --color-background: #FDF8F3;
      --font-display: 'Fraunces', Georgia, serif;
      --font-body: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --space-xs: 0.25rem;
      --space-sm: 0.5rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;
      --space-2xl: 3rem;
      --space-3xl: 4rem;
      --space-4xl: 6rem;
      --space-5xl: 8rem;
      --radius-sm: 0.5rem;
      --radius-md: 1rem;
      --radius-lg: 1.5rem;
      --radius-xl: 2rem;
      --radius-full: 9999px;
      --shadow-sm: 0 2px 8px rgba(45, 48, 71, 0.04);
      --shadow-md: 0 4px 20px rgba(45, 48, 71, 0.08);
      --transition-fast: 150ms ease;
      --transition-base: 250ms ease;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      background-color: var(--color-background);
    }

    body {
      font-family: var(--font-body);
      line-height: 1.6;
      color: var(--color-text-primary);
      overflow-x: hidden;
    }

    #root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app {
      position: relative;
      min-height: 100vh;
    }

    .canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .main-content {
      position: relative;
      z-index: 1;
    }

    h1,
    h2,
    h3 {
      font-family: var(--font-display);
      line-height: 1.2;
    }

    h1 {
      font-size: clamp(2.5rem, 5vw + 1rem, 4.5rem);
    }

    .container {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 var(--space-lg);
    }

    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: var(--space-5xl) 0 var(--space-3xl);
      overflow: hidden;
    }

    .hero__container {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-3xl);
      align-items: center;
    }

    @media (min-width: 1024px) {
      .hero__container {
        grid-template-columns: 1fr 1fr;
      }
    }

    .hero__title {
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 700;
      margin-bottom: var(--space-lg);
      animation: fadeIn 0.8s ease-out forwards;
    }

    .hero__title-accent {
      display: block;
      background: linear-gradient(135deg, var(--color-mint) 0%, var(--color-lavender) 50%, var(--color-peach) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero__subtitle {
      font-size: 1.125rem;
      line-height: 1.7;
      color: var(--color-text-secondary);
      margin-bottom: var(--space-xl);
      max-width: 480px;
      animation: fadeIn 0.8s ease-out 0.2s forwards;
      opacity: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.875rem 1.75rem;
      border-radius: var(--radius-full);
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-base);
    }

    .btn-primary {
      background-color: var(--color-peach);
      color: var(--color-text-primary);
      border: none;
    }

    .btn-secondary {
      background-color: var(--color-mint);
      color: var(--color-text-primary);
      border: none;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
